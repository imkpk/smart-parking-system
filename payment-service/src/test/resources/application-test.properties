spring.datasource.url=jdbc:h2:mem:payment_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

security.jwt.secret=test-secret-key-for-jwt-signing-min-32-chars
app.cors.allowed-origins=http://localhost:5173

payment.provider=MOCK
payment.razorpay.key-secret=test_secret_key