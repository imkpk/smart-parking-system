spring.application.name=payment-service
server.port=${PORT:${SERVER_PORT:8081}}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/parking_payment_db}
spring.datasource.username=${DB_USERNAME:parking_user}
spring.datasource.password=${DB_PASSWORD:parking_password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

security.jwt.secret=${JWT_SECRET:smart_parking_dev_jwt_secret_32_chars_minimum}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}