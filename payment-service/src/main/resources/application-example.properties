spring.application.name=payment-service
server.port=8081

spring.datasource.url=jdbc:postgresql://localhost:5432/parking_payment_db
spring.datasource.username=parking_user
spring.datasource.password=parking_password
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

management.endpoints.web.exposure.include=health,info

security.jwt.secret=smart_parking_dev_jwt_secret_32_chars_minimum
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173

payment.provider=MOCK
payment.razorpay.key-id=rzp_test_your_key_id
payment.razorpay.key-secret=your_razorpay_key_secret
payment.razorpay.webhook-secret=your_razorpay_webhook_secret
payment.razorpay.currency=INR