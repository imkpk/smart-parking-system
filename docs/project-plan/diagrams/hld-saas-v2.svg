  <line x1="190" y1="300" x2="248" y2="300" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="218" y="292" text-anchor="middle" fill="#64748b" font-size="9">HTTPS</text>

  <!-- PLATFORM LAYER -->
  <rect x="248" y="120" width="1180" height="56" rx="10" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="6 3" filter="url(#shadow)"/>
  <text x="268" y="144" fill="#5b21b6" font-size="12" font-weight="700">PLATFORM LAYER</text>
  <text x="268" y="162" fill="#64748b" font-size="10">Tenant Onboarding · Subscription Plans · Platform Billing · Cross-tenant Analytics</text>

  <!-- TENANT LAYER -->
  <rect x="248" y="186" width="1180" height="56" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="6 3" filter="url(#shadow)"/>
  <text x="268" y="210" fill="#4338ca" font-size="12" font-weight="700">TENANT LAYER — Organization (organizationId on all data)</text>
  <text x="268" y="228" fill="#64748b" font-size="10">White-label Branding · Tenant Users · Multi-site Lots · Plan Limits (STARTER / PRO / ENTERPRISE)</text>

  <!-- FRONTEND -->
  <rect x="248" y="262" width="560" height="200" rx="12" fill="#ffffff" stroke="#1f6feb" stroke-width="2" filter="url(#shadow)"/>
  <rect x="248" y="262" width="560" height="36" rx="12" fill="#1f6feb"/>
  <rect x="248" y="286" width="560" height="12" fill="#1f6feb"/>
  <text x="528" y="286" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">FRONTEND — React + TypeScript + Vite + MUI</text>

  <text x="268" y="320" fill="#1e40af" font-size="11" font-weight="600">Surfaces</text>
  <text x="268" y="340" fill="#334155" font-size="10">• Tenant Admin Console</text>
  <text x="268" y="356" fill="#334155" font-size="10">• Tenant Admin + White-label Theme (logo, colors)</text>
  <text x="268" y="372" fill="#334155" font-size="10">• Operator Dashboard — occupancy, revenue, heatmap</text>
  <text x="268" y="388" fill="#334155" font-size="10">• Visual Slot Map — floor grid, live status colors</text>
  <text x="268" y="404" fill="#334155" font-size="10">• Mobile Security Gate — check-in / check-out</text>
  <text x="268" y="420" fill="#334155" font-size="10">• User Portal — vehicles, bookings, payments</text>
  <text x="268" y="448" fill="#64748b" font-size="10" font-weight="600">REST APIs + JWT (organizationId, role)  |  Razorpay Checkout.js</text>

  <!-- MAIN BACKEND -->
  <rect x="248" y="482" width="560" height="248" rx="12" fill="#ffffff" stroke="#0f766e" stroke-width="2" filter="url(#shadow)"/>
  <rect x="248" y="482" width="560" height="36" rx="12" fill="#0f766e"/>
  <rect x="248" y="506" width="560" height="12" fill="#0f766e"/>
  <text x="528" y="506" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">MAIN BACKEND — NestJS + Prisma</text>

  <text x="268" y="536" fill="#0f766e" font-size="11" font-weight="600">Modules (tenant-scoped)</text>
  <rect x="268" y="544" width="150" height="22" rx="4" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="343" y="559" text-anchor="middle" fill="#065f46" font-size="9">Organizations</text>
  <rect x="428" y="544" width="150" height="22" rx="4" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="503" y="559" text-anchor="middle" fill="#065f46" font-size="9">Auth &amp; RBAC + TenantGuard</text>
  <rect x="588" y="544" width="150" height="22" rx="4" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="663" y="559" text-anchor="middle" fill="#065f46" font-size="9">Lots / Floors / Slots</text>

  <rect x="268" y="574" width="150" height="22" rx="4" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="343" y="589" text-anchor="middle" fill="#065f46" font-size="9">Vehicles</text>
  <rect x="428" y="574" width="150" height="22" rx="4" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="503" y="589" text-anchor="middle" fill="#065f46" font-size="9">Bookings</text>
  <rect x="588" y="574" width="150" height="22" rx="4" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="663" y="589" text-anchor="middle" fill="#065f46" font-size="9">Parking Events</text>

  <rect x="268" y="604" width="150" height="22" rx="4" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="343" y="619" text-anchor="middle" fill="#065f46" font-size="9">Slot Lifecycle</text>
  <rect x="428" y="604" width="150" height="22" rx="4" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="503" y="619" text-anchor="middle" fill="#065f46" font-size="9">Dashboard / Reports</text>

  <text x="268" y="652" fill="#334155" font-size="10">JWT Auth · Guards · DTO Validation · Prisma ORM</text>
  <rect x="268" y="664" width="500" height="52" rx="6" fill="#f0fdf4" stroke="#86efac"/>
  <text x="518" y="684" text-anchor="middle" fill="#166534" font-size="11" font-weight="600">MySQL — parking_lot_db</text>
  <text x="518" y="702" text-anchor="middle" fill="#64748b" font-size="9">organizations · users · parking_lots · floors · slots · vehicles · bookings · parking_events</text>

  <!-- PAYMENT SERVICE -->
  <rect x="848" y="262" width="580" height="468" rx="12" fill="#ffffff" stroke="#ea580c" stroke-width="2" filter="url(#shadow)"/>
  <rect x="848" y="262" width="580" height="36" rx="12" fill="#ea580c"/>
  <rect x="848" y="286" width="580" height="12" fill="#ea580c"/>
  <text x="1138" y="286" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="700">PAYMENT SERVICE — Spring Boot</text>

  <text x="868" y="320" fill="#c2410c" font-size="11" font-weight="600">Capabilities</text>
  <text x="868" y="340" fill="#334155" font-size="10">• Initiate Payment (Razorpay order)</text>
  <text x="868" y="356" fill="#334155" font-size="10">• Verify Payment (signature check)</text>
  <text x="868" y="372" fill="#334155" font-size="10">• Razorpay Webhook Handler</text>
  <text x="868" y="388" fill="#334155" font-size="10">• Payment History (tenant-scoped)</text>
  <text x="868" y="404" fill="#334155" font-size="10">• Reports Summary</text>
  <text x="868" y="420" fill="#334155" font-size="10">• Mock Success / Failure (dev only)</text>

  <text x="868" y="448" fill="#334155" font-size="10">JPA / Repository</text>
  <rect x="868" y="456" width="500" height="52" rx="6" fill="#fff7ed" stroke="#fdba74"/>
  <text x="1118" y="476" text-anchor="middle" fill="#9a3412" font-size="11" font-weight="600">MySQL — parking_payment_db</text>
  <text x="1118" y="494" text-anchor="middle" fill="#64748b" font-size="9">payments · payment_status · provider_reference · organizationId</text>

  <!-- RAZORPAY -->
  <rect x="948" y="530" width="340" height="100" rx="10" fill="#0f172a" filter="url(#shadow)"/>
  <text x="1118" y="560" text-anchor="middle" fill="#38bdf8" font-size="14" font-weight="700">Razorpay</text>
  <text x="1118" y="580" text-anchor="middle" fill="#94a3b8" font-size="10">Checkout · Orders · Webhooks</text>
  <text x="1118" y="598" text-anchor="middle" fill="#64748b" font-size="9">payment.captured · payment.failed</text>
  <text x="1118" y="614" text-anchor="middle" fill="#64748b" font-size="9">External Payment Provider</text>

  <!-- Arrows -->
  <line x1="808" y1="362" x2="848" y2="362" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="828" y="354" text-anchor="middle" fill="#64748b" font-size="9">REST</text>

  <line x1="528" y1="462" x2="528" y2="482" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <line x1="808" y1="606" x2="868" y2="606" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="838" y="598" text-anchor="middle" fill="#64748b" font-size="9">HTTP checkout</text>

  <line x1="1118" y1="508" x2="1118" y2="530" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="1140" y="522" fill="#64748b" font-size="9">API</text>

  <path d="M 948 580 Q 900 580 900 400 Q 900 320 808 320" fill="none" stroke="#38bdf8" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text x="870" y="390" fill="#0284c7" font-size="9">Checkout.js</text>

  <path d="M 1288 580 Q 1340 580 1340 400 Q 1340 350 848 350" fill="none" stroke="#f97316" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text x="1320" y="420" fill="#ea580c" font-size="9">Webhook</text>

  <!-- BUSINESS FLOW -->
  <rect x="40" y="758" width="1400" height="200" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="60" y="786" fill="#0f172a" font-size="14" font-weight="700">CORE BUSINESS FLOW (SaaS)</text>

  <g font-size="10" fill="#334155">
    <circle cx="80" cy="812" r="12" fill="#1f6feb"/><text x="80" y="816" text-anchor="middle" fill="#fff" font-weight="700">1</text>
    <text x="100" y="816">Tenant onboarded (public signup)</text>

    <circle cx="310" cy="812" r="12" fill="#1f6feb"/><text x="310" y="816" text-anchor="middle" fill="#fff" font-weight="700">2</text>
    <text x="330" y="816">User login (branded)</text>

    <circle cx="500" cy="812" r="12" fill="#1f6feb"/><text x="500" y="816" text-anchor="middle" fill="#fff" font-weight="700">3</text>
    <text x="520" y="816">Register vehicle</text>

    <circle cx="660" cy="812" r="12" fill="#1f6feb"/><text x="660" y="816" text-anchor="middle" fill="#fff" font-weight="700">4</text>
    <text x="680" y="816">Book slot → RESERVED</text>

    <circle cx="860" cy="812" r="12" fill="#0f766e"/><text x="860" y="816" text-anchor="middle" fill="#fff" font-weight="700">5</text>
    <text x="880" y="816">Check-in → ACTIVE</text>

    <circle cx="1060" cy="812" r="12" fill="#0f766e"/><text x="1060" y="816" text-anchor="middle" fill="#fff" font-weight="700">6</text>
    <text x="1080" y="816">Check-out + fee</text>

    <circle cx="80" cy="852" r="12" fill="#ea580c"/><text x="80" y="856" text-anchor="middle" fill="#fff" font-weight="700">7</text>
    <text x="100" y="856">NestJS → Payment Service</text>

    <circle cx="310" cy="852" r="12" fill="#ea580c"/><text x="310" y="856" text-anchor="middle" fill="#fff" font-weight="700">8</text>
    <text x="330" y="856">Razorpay order + checkout</text>

    <circle cx="560" cy="852" r="12" fill="#ea580c"/><text x="560" y="856" text-anchor="middle" fill="#fff" font-weight="700">9</text>
    <text x="580" y="856">Webhook → payment SUCCESS</text>

    <circle cx="800" cy="852" r="12" fill="#6366f1"/><text x="800" y="856" text-anchor="middle" fill="#fff" font-weight="700">10</text>
    <text x="820" y="856">Dashboard &amp; reports</text>
  </g>

  <line x1="60" y1="878" x2="1420" y2="878" stroke="#e2e8f0" stroke-width="1"/>
  <text x="60" y="900" fill="#64748b" font-size="10">Booking reserves slot · Check-in → OCCUPIED · Check-out releases slot + initiates payment · All data scoped by organizationId</text>

  <!-- KEY RULES -->
  <rect x="40" y="978" width="1400" height="172" rx="12" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="60" y="1006" fill="#0f172a" font-size="14" font-weight="700">KEY RULES BY ROLE</text>

  <rect x="60" y="1020" width="250" height="112" rx="8" fill="#f5f3ff" stroke="#c4b5fd"/>
  <text x="72" y="1040" fill="#5b21b6" font-size="10" font-weight="700">TENANT_ADMIN</text>
  <text x="72" y="1058" fill="#334155" font-size="9">Manage tenants, plans, branding</text>
  <text x="72" y="1074" fill="#334155" font-size="9">All lots &amp; users within org</text>
  <text x="72" y="1090" fill="#334155" font-size="9">Revenue &amp; occupancy reports</text>
  <text x="72" y="1106" fill="#334155" font-size="9">Never see other tenants' data</text>

  <rect x="330" y="1020" width="250" height="112" rx="8" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="342" y="1040" fill="#1d4ed8" font-size="10" font-weight="700">ADMIN</text>
  <text x="342" y="1058" fill="#334155" font-size="9">Lot config, floors, slots</text>
  <text x="342" y="1074" fill="#334155" font-size="9">Check-in / check-out</text>
  <text x="342" y="1090" fill="#334155" font-size="9">Visual slot map &amp; dashboard</text>
  <text x="342" y="1106" fill="#334155" font-size="9">Mock payment (dev only)</text>

  <rect x="600" y="1020" width="250" height="112" rx="8" fill="#ecfdf5" stroke="#6ee7b7"/>
  <text x="612" y="1040" fill="#047857" font-size="10" font-weight="700">SECURITY</text>
  <text x="612" y="1058" fill="#334155" font-size="9">Mobile gate check-in/out</text>
  <text x="612" y="1074" fill="#334155" font-size="9">View active parking events</text>
  <text x="612" y="1090" fill="#334155" font-size="9">Search booking / vehicle</text>
  <text x="612" y="1106" fill="#334155" font-size="9">No admin or payment settings</text>

  <rect x="870" y="1020" width="250" height="112" rx="8" fill="#fff7ed" stroke="#fdba74"/>
  <text x="882" y="1040" fill="#c2410c" font-size="10" font-weight="700">USER</text>
  <text x="882" y="1058" fill="#334155" font-size="9">Register own vehicles</text>
  <text x="882" y="1074" fill="#334155" font-size="9">Book &amp; cancel own bookings</text>
  <text x="882" y="1090" fill="#334155" font-size="9">Pay via Razorpay checkout</text>
  <text x="882" y="1106" fill="#334155" font-size="9">Own history only</text>

  <rect x="1140" y="1020" width="280" height="112" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="1152" y="1040" fill="#475569" font-size="10" font-weight="700">v1 → v2 UPGRADE</text>
  <text x="1152" y="1058" fill="#334155" font-size="9">+ Organization / multi-tenant</text>
  <text x="1152" y="1074" fill="#334155" font-size="9">+ White-label + 2 new roles</text>
  <text x="1152" y="1090" fill="#334155" font-size="9">+ Slot map + mobile gate UI</text>
  <text x="1152" y="1106" fill="#334155" font-size="9">+ Razorpay live payments</text>

  <!-- Footer -->
  <text x="740" y="1168" text-anchor="middle" fill="#94a3b8" font-size="10">Smart Parking SaaS · HLD v2 · docs/project-plan/diagrams/hld-saas-v2.svg · 2026</text>
</svg>