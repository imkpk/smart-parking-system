<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1480 1180" font-family="Inter, Segoe UI, Arial, sans-serif">
  <defs>
    <linearGradient id="hdr" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#1f6feb"/>
    </linearGradient>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1480" height="1180" fill="#f8fafc"/>

  <!-- Title -->
  <rect x="40" y="24" width="1400" height="72" rx="12" fill="url(#hdr)" filter="url(#shadow)"/>
  <text x="740" y="58" text-anchor="middle" fill="#ffffff" font-size="26" font-weight="700">Smart Parking SaaS — High Level System Design v2</text>
  <text x="740" y="82" text-anchor="middle" fill="#bfdbfe" font-size="14">React Frontend + NestJS Main API + Spring Boot Payment Service + Razorpay</text>

  <!-- ACTORS -->
  <text x="100" y="130" fill="#334155" font-size="13" font-weight="700">SYSTEM ACTORS</text>

  <g filter="url(#shadow)">
    <rect x="60" y="145" width="130" height="52" rx="8" fill="#7c3aed" opacity="0.12" stroke="#7c3aed" stroke-width="1.5"/>
    <circle cx="88" cy="171" r="14" fill="#7c3aed"/>
    <text x="88" y="176" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">SA</text>
    <text x="110" y="168" fill="#5b21b6" font-size="11" font-weight="700">Platform</text>
    <text x="110" y="183" fill="#64748b" font-size="9">Platform owner</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="60" y="208" width="130" height="52" rx="8" fill="#6366f1" opacity="0.12" stroke="#6366f1" stroke-width="1.5"/>
    <circle cx="88" cy="234" r="14" fill="#6366f1"/>
    <text x="88" y="239" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">TA</text>
    <text x="110" y="231" fill="#4338ca" font-size="11" font-weight="700">TENANT_ADMIN</text>
    <text x="110" y="246" fill="#64748b" font-size="9">Customer org</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="60" y="271" width="130" height="52" rx="8" fill="#1f6feb" opacity="0.12" stroke="#1f6feb" stroke-width="1.5"/>
    <circle cx="88" cy="297" r="14" fill="#1f6feb"/>
    <text x="88" y="302" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">A</text>
    <text x="110" y="294" fill="#1d4ed8" font-size="11" font-weight="700">ADMIN</text>
    <text x="110" y="309" fill="#64748b" font-size="9">Lot manager</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="60" y="334" width="130" height="52" rx="8" fill="#0f766e" opacity="0.12" stroke="#0f766e" stroke-width="1.5"/>
    <circle cx="88" cy="360" r="14" fill="#0f766e"/>
    <text x="88" y="365" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">S</text>
    <text x="110" y="357" fill="#0d9488" font-size="11" font-weight="700">SECURITY</text>
    <text x="110" y="372" fill="#64748b" font-size="9">Gate operator</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="60" y="397" width="130" height="52" rx="8" fill="#ea580c" opacity="0.12" stroke="#ea580c" stroke-width="1.5"/>
    <circle cx="88" cy="423" r="14" fill="#ea580c"/>
    <text x="88" y="428" text-anchor="middle" fill="#fff" font-size="10" font-weight="700">U</text>
    <text x="110" y="420" fill="#c2410c" font-size="11" font-weight="700">USER</text>
    <text x="110" y="435" fill="#64748b" font-size="9">Resident / visitor</text>
  </g>

