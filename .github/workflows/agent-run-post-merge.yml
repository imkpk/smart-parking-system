name: Agent-run post-merge status

on:
  pull_request:
    types: [closed]
    branches: [develop]

permissions:
  contents: write

jobs:
  update-status:
    name: Update agent-run status on merge
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout develop
        uses: actions/checkout@v5
        with:
          ref: develop
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Sync agent-run and report status
        id: sync
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/agent-run-post-merge.mjs

      - name: Commit and push to develop
        run: |
          if [ ! -f .agent-run-post-merge.json ]; then
            echo "No marker file — skip push"
            exit 0
          fi
          node -e "const j=require('./.agent-run-post-merge.json'); if(!j.changed) process.exit(2)"
          if [ $? -eq 2 ]; then
            echo "No file changes — skip push"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull origin develop --rebase
          git add .grok/agent-runs/ .grok/reports/
          if git diff --cached --quiet; then
            echo "Nothing staged — skip push"
            exit 0
          fi
          git commit -m "chore(agent-runs): mark PR #${{ github.event.pull_request.number }} merged [skip ci]"
          git push origin develop