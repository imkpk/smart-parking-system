name: Secrets Scan

on:
  workflow_call:
  pull_request:
    branches: [main, develop, single-tenant]
  push:
    branches: [main, develop, single-tenant]

permissions:
  contents: read
  pull-requests: write

jobs:
  secrets-scan:
    name: secrets-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'true' || 'false' }}
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: 'false'
        continue-on-error: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}