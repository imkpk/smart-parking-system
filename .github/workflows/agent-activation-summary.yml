name: Agent Activation Summary

on:
  pull_request:
    branches: [develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  summarize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect changed domains
        id: domains
        run: |
          git fetch origin develop
          FILES=$(git diff origin/develop...HEAD --name-only)
          echo "Changed files:"
          echo "$FILES"

          AGENTS=""
          echo "$FILES" | grep -q "^backend/src/" && AGENTS="$AGENTS ②CoreAPI"
          echo "$FILES" | grep -q "^frontend/src/" && AGENTS="$AGENTS ③Experience"
          echo "$FILES" | grep -q "^payment-service/" && AGENTS="$AGENTS ④Payments"
          echo "$FILES" | grep -qE "^backend/prisma/|schema\.prisma" && AGENTS="$AGENTS ⑥Database"
          echo "$FILES" | grep -qE "^\.github/workflows/|Dockerfile|docker-compose|\.env\.example|^scripts/" && AGENTS="$AGENTS ⑦DevOps"
          echo "$FILES" | grep -qiE "auth|guard|interceptor|permission|jwt" && AGENTS="$AGENTS ⑧Security"
          echo "$FILES" | grep -qE "\.(spec|test)\.(ts|tsx|java)$|jest\.config|vitest" && AGENTS="$AGENTS ⑨Testing"
          echo "$FILES" | grep -qE "^docs/|\.md$|^\.grok/" && AGENTS="$AGENTS ⑩Docs"
          echo "$FILES" | grep -qiE "event|listener|subscriber|notification|email|websocket|gateway" && AGENTS="$AGENTS ⑫Events"

          echo "agents<<EOF" >> "$GITHUB_OUTPUT"
          echo "$AGENTS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "Activated specialists:$AGENTS"

      - name: Post activation summary as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const agents = `${{ steps.domains.outputs.agents }}`.trim();
            const lines = agents ? agents.split(/\s+/).filter(Boolean) : [];
            const body = [
              '## Agent Activation Summary',
              '',
              'Activated agents for this PR:',
              '```',
              '① Orchestrator (always)',
              ...lines,
              '⑨ Testing Agent (after writers, if code changed)',
              '⑤ Quality Agent (always — last)',
              '```',
              '',
              '> Generated by `agent-activation-summary` workflow. See `docs/agents/ROLES.md` §2.',
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });