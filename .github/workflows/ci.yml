name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend:
    name: NestJS Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:cov

  frontend:
    name: React Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:run

      - name: Test coverage
        id: coverage
        run: npm run coverage

      - name: Upload frontend coverage artifact
        if: steps.coverage.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          if-no-files-found: error

      - name: Frontend coverage summary
        if: steps.coverage.outcome == 'success'
        run: node ../.github/scripts/frontend-coverage-summary.mjs

      - name: Post frontend coverage PR comment
        if: github.event_name == 'pull_request' && steps.coverage.outcome == 'success'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: frontend-coverage
          path: frontend/coverage/pr-coverage-comment.md

  payment-service:
    name: Spring Boot Payment Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: payment-service
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build
        run: mvn -B clean package
