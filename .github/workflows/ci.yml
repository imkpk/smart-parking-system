name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      payment: ${{ steps.filter.outputs.payment }}
      workflow: ${{ steps.filter.outputs.workflow }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            payment:
              - 'payment-service/**'
            workflow:
              - '.github/workflows/**'
            docs:
              - '**/*.md'
              - 'docs/**'
              - '.grok/**'

  backend:
    name: NestJS Backend
    needs: changes
    if: >
      github.event_name == 'push' ||
      needs.changes.outputs.backend == 'true' ||
      needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:cov

  frontend:
    name: React Frontend
    needs: changes
    if: >
      github.event_name == 'push' ||
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test with coverage
        id: coverage
        run: npm run coverage

      - name: Upload frontend coverage artifact
        if: steps.coverage.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          if-no-files-found: error

      - name: Frontend coverage summary
        if: steps.coverage.outcome == 'success'
        run: node ../.github/scripts/frontend-coverage-summary.mjs

      - name: Post frontend coverage PR comment
        if: github.event_name == 'pull_request' && steps.coverage.outcome == 'success'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: frontend-coverage
          path: frontend/coverage/pr-coverage-comment.md

  payment-service:
    name: Spring Boot Payment Service
    needs: changes
    if: >
      github.event_name == 'push' ||
      needs.changes.outputs.payment == 'true' ||
      needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: payment-service
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build
        run: mvn -B clean package

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [changes, backend, frontend, payment-service]
    if: always()
    steps:
      - name: Verify CI results
        run: |
          echo "Backend: ${{ needs.backend.result }}"
          echo "Frontend: ${{ needs.frontend.result }}"
          echo "Payment: ${{ needs.payment-service.result }}"

          failed=0
          if [ "${{ needs.backend.result }}" = "failure" ] || [ "${{ needs.backend.result }}" = "cancelled" ]; then
            echo "Backend job failed or was cancelled"
            failed=1
          fi
          if [ "${{ needs.frontend.result }}" = "failure" ] || [ "${{ needs.frontend.result }}" = "cancelled" ]; then
            echo "Frontend job failed or was cancelled"
            failed=1
          fi
          if [ "${{ needs.payment-service.result }}" = "failure" ] || [ "${{ needs.payment-service.result }}" = "cancelled" ]; then
            echo "Payment service job failed or was cancelled"
            failed=1
          fi

          if [ "$failed" -eq 1 ]; then
            exit 1
          fi

          echo "CI passed (skipped service jobs are OK)"