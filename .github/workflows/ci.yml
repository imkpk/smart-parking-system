name: CI

on:
  pull_request:
    branches: [main, develop, single-tenant]
  push:
    branches: [main, develop, single-tenant]

permissions:
  contents: read
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  secrets-scan:
    name: secrets-scan
    uses: ./.github/workflows/secrets-scan.yml
    secrets: inherit

  changes:
    name: Detect changes
    needs: secrets-scan
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      payment: ${{ steps.filter.outputs.payment }}
      workflow: ${{ steps.filter.outputs.workflow }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            payment:
              - 'payment-service/**'
            workflow:
              - '.github/workflows/**'
            docs:
              - '**/*.md'
              - 'docs/**'
              - '.grok/**'

  backend:
    name: NestJS Backend
    needs: changes
    if: >
      github.event_name == 'push' ||
      needs.changes.outputs.backend == 'true' ||
      needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build
        run: npm run build

      - name: Test (fast PR gate)
        if: github.event_name == 'pull_request'
        run: npm run test:run

      - name: Test with coverage (integration trunk)
        if: github.event_name == 'push'
        run: npm run test:cov

  frontend:
    name: React Frontend
    needs: changes
    if: >
      github.event_name == 'push' ||
      needs.changes.outputs.frontend == 'true' ||
      needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test (fast PR gate)
        if: github.event_name == 'pull_request'
        run: npm run test:run

      - name: Test with coverage (integration trunk)
        if: github.event_name == 'push'
        id: coverage
        run: npm run coverage

      - name: Frontend coverage summary
        if: github.event_name == 'push' && steps.coverage.outcome == 'success'
        run: node ../.github/scripts/frontend-coverage-summary.mjs

  payment-service:
    name: Spring Boot Payment Service
    needs: changes
    if: >
      github.event_name == 'push' ||
      needs.changes.outputs.payment == 'true' ||
      needs.changes.outputs.workflow == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: payment-service
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Build
        run: mvn -B clean package

  e2e-smoke:
    name: Cypress E2E Smoke
    needs: changes
    if: >
      github.event_name == 'push' &&
      (
        needs.changes.outputs.frontend == 'true' ||
        needs.changes.outputs.backend == 'true' ||
        needs.changes.outputs.workflow == 'true'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30
    continue-on-error: true
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: smart_parking_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgresql://postgres:password@127.0.0.1:5432/smart_parking_db?schema=public
      SHADOW_DATABASE_URL: postgresql://postgres:password@127.0.0.1:5432/smart_parking_shadow_db?schema=public
      PORT: '3000'
      JWT_SECRET: smart_parking_dev_jwt_secret_32_chars_minimum
      JWT_EXPIRES_IN: 1d
      PAYMENT_SERVICE_URL: http://127.0.0.1:8081
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      DB_URL: jdbc:postgresql://postgres:password@127.0.0.1:5432/parking_payment_db
      DB_USERNAME: postgres
      DB_PASSWORD: password
      JWT_SECRET_PAYMENT: smart_parking_dev_jwt_secret_32_chars_minimum
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Prepare databases
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq postgresql-client
          PGPASSWORD=password psql -h 127.0.0.1 -U postgres -d postgres -c "CREATE DATABASE smart_parking_shadow_db;"
          PGPASSWORD=password psql -h 127.0.0.1 -U postgres -d postgres -c "CREATE DATABASE parking_payment_db;"

      - name: Install and migrate backend
        working-directory: backend
        run: |
          npm ci
          npx prisma generate
          npx prisma migrate deploy
          npm run prisma:seed
          npm run build

      - name: Start backend API
        working-directory: backend
        run: |
          npm run start > ../backend-e2e.log 2>&1 &
          echo $! > ../backend-e2e.pid

      - name: Build and start payment service
        working-directory: payment-service
        run: |
          mvn -B -q package -DskipTests
          JWT_SECRET="${JWT_SECRET_PAYMENT}" \
          DB_URL="${DB_URL}" \
          DB_USERNAME="${DB_USERNAME}" \
          DB_PASSWORD="${DB_PASSWORD}" \
          java -jar target/*.jar > ../payment-e2e.log 2>&1 &
          echo $! > ../payment-e2e.pid

      - name: Wait for backend and payment service
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:3000/api/health >/dev/null && curl -sf http://127.0.0.1:8081/actuator/health >/dev/null; then
              echo "Services ready"
              exit 0
            fi
            sleep 2
          done
          echo "Backend log:"
          tail -n 80 backend-e2e.log || true
          echo "Payment log:"
          tail -n 80 payment-e2e.log || true
          exit 1

      - name: Install frontend and run Cypress smoke
        working-directory: frontend
        env:
          CYPRESS_SCREENSHOT_ON_RUN_FAILURE: 'false'
        run: |
          npm ci
          npx cypress verify
          npm run e2e:ci

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [changes, backend, frontend, payment-service, e2e-smoke]
    if: always()
    steps:
      - name: Verify CI results
        run: |
          echo "Event: ${{ github.event_name }}"
          echo "Ref: ${{ github.ref }}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "Gate mode: fast PR checks (build + unit tests; no Cypress)"
          else
            echo "Gate mode: full integration trunk checks (coverage + Cypress smoke on relevant paths)"
          fi
          echo "Backend: ${{ needs.backend.result }}"
          echo "Frontend: ${{ needs.frontend.result }}"
          echo "Payment: ${{ needs.payment-service.result }}"
          echo "E2E Smoke (advisory on push only): ${{ needs.e2e-smoke.result }}"

          failed=0
          if [ "${{ needs.backend.result }}" = "failure" ] || [ "${{ needs.backend.result }}" = "cancelled" ]; then
            echo "Backend job failed or was cancelled"
            failed=1
          fi
          if [ "${{ needs.frontend.result }}" = "failure" ] || [ "${{ needs.frontend.result }}" = "cancelled" ]; then
            echo "Frontend job failed or was cancelled"
            failed=1
          fi
          if [ "${{ needs.payment-service.result }}" = "failure" ] || [ "${{ needs.payment-service.result }}" = "cancelled" ]; then
            echo "Payment service job failed or was cancelled"
            failed=1
          fi

          if [ "$failed" -eq 1 ]; then
            exit 1
          fi

          echo "CI passed (skipped service jobs are OK)"