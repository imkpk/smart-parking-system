openapi: 3.0.3
info:
  title: Smart Parking Backend API
  description: Smart Parking backend APIs for auth, parking structure, bookings, and parking events.
  version: 1.0.0
servers:
  - url: http://localhost:3000/api
tags:
  - name: Health
  - name: Auth
  - name: Users
  - name: Parking Lots
  - name: Floors
  - name: Slots
  - name: Vehicles
  - name: Bookings
  - name: Parking Events
  - name: Dashboard
paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        "200":
          description: Backend is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

  /auth/register:
    post:
      tags: [Auth]
      summary: Register user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "409":
          description: Email is already registered

  /auth/login:
    post:
      tags: [Auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid email or password

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Missing, invalid, or expired JWT

  /users:
    get:
      tags: [Users]
      summary: List users
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
        "403":
          description: ADMIN role is required

  /users/{id}:
    get:
      tags: [Users]
      summary: Get user by id
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found

  /parking-lots:
    get:
      tags: [Parking Lots]
      summary: List active parking lots
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Active parking lots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ParkingLot"
    post:
      tags: [Parking Lots]
      summary: Create parking lot
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateParkingLotRequest"
      responses:
        "201":
          description: Parking lot created

  /parking-lots/{id}:
    get:
      tags: [Parking Lots]
      summary: Get parking lot by id
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Parking lot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParkingLot"
        "404":
          description: Parking lot not found
    patch:
      tags: [Parking Lots]
      summary: Update parking lot
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateParkingLotRequest"
      responses:
        "200":
          description: Parking lot updated
    delete:
      tags: [Parking Lots]
      summary: Mark parking lot inactive
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Parking lot marked inactive

  /parking-lots/{parkingLotId}/floors:
    get:
      tags: [Floors]
      summary: List floors by parking lot
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ParkingLotId"
      responses:
        "200":
          description: Floors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Floor"
    post:
      tags: [Floors]
      summary: Create floor
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ParkingLotId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFloorRequest"
      responses:
        "201":
          description: Floor created

  /floors/{id}:
    patch:
      tags: [Floors]
      summary: Update floor
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFloorRequest"
      responses:
        "200":
          description: Floor updated
    delete:
      tags: [Floors]
      summary: Delete floor
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Floor deleted

  /parking-lots/{parkingLotId}/slots:
    get:
      tags: [Slots]
      summary: List slots by parking lot
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ParkingLotId"
      responses:
        "200":
          description: Slots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Slot"

  /parking-lots/{parkingLotId}/available-slots:
    get:
      tags: [Slots]
      summary: Search available slots
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ParkingLotId"
        - name: vehicleType
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/VehicleType"
      responses:
        "200":
          description: Available slots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Slot"

  /floors/{floorId}/slots:
    post:
      tags: [Slots]
      summary: Create slot
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/FloorId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSlotRequest"
      responses:
        "201":
          description: Slot created

  /floors/{floorId}/slots/bulk:
    post:
      tags: [Slots]
      summary: Bulk create slots
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/FloorId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBulkSlotsRequest"
      responses:
        "201":
          description: Slots created

  /slots/{id}/status:
    patch:
      tags: [Slots]
      summary: Update slot status
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSlotStatusRequest"
      responses:
        "200":
          description: Slot status updated

  /vehicles:
    get:
      tags: [Vehicles]
      summary: List all vehicles
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Vehicles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vehicle"
    post:
      tags: [Vehicles]
      summary: Register vehicle
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVehicleRequest"
      responses:
        "201":
          description: Vehicle registered

  /vehicles/my:
    get:
      tags: [Vehicles]
      summary: List current user vehicles
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user vehicles

  /vehicles/{id}:
    get:
      tags: [Vehicles]
      summary: Get vehicle by id
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Vehicle
    patch:
      tags: [Vehicles]
      summary: Update vehicle
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVehicleRequest"
      responses:
        "200":
          description: Vehicle updated
    delete:
      tags: [Vehicles]
      summary: Delete vehicle
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Vehicle deleted

  /bookings:
    get:
      tags: [Bookings]
      summary: List all bookings
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Bookings
    post:
      tags: [Bookings]
      summary: Create booking
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookingRequest"
      responses:
        "201":
          description: Booking created and slot reserved

  /bookings/my:
    get:
      tags: [Bookings]
      summary: List current user bookings
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user bookings

  /bookings/{id}:
    get:
      tags: [Bookings]
      summary: Get booking by id
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Booking

  /bookings/{id}/cancel:
    post:
      tags: [Bookings]
      summary: Cancel booking
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Booking cancelled and slot released

  /parking-events/check-in:
    post:
      tags: [Parking Events]
      summary: Check in vehicle
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckInRequest"
      responses:
        "201":
          description: Vehicle checked in and slot occupied

  /parking-events/check-out:
    post:
      tags: [Parking Events]
      summary: Check out vehicle
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CheckOutRequest"
      responses:
        "200":
          description: Vehicle checked out, fee calculated, and slot released
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CheckoutResponse"

  /parking-events/active:
    get:
      tags: [Parking Events]
      summary: List active parking events
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Active parking events

  /parking-events/history:
    get:
      tags: [Parking Events]
      summary: List current user parking history
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user parking history

  /parking-events:
    get:
      tags: [Parking Events]
      summary: List all parking events
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Parking events

  /parking-events/{id}:
    get:
      tags: [Parking Events]
      summary: Get parking event by id
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Parking event

  /events/outbox:
    get:
      tags: [Events]
      summary: List outbox events for platform monitoring
      description: SUPER_ADMIN-only read endpoint. Response intentionally excludes event payloads.
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/OutboxEventStatus"
        - name: eventType
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/OutboxEventType"
        - name: organizationId
          in: query
          required: false
          schema:
            type: integer
            example: 1
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            maximum: 100
            example: 50
      responses:
        "200":
          description: Safe outbox event list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OutboxMonitorEvent"
        "401":
          description: Authentication required
        "403":
          description: SUPER_ADMIN role is required

  /events/outbox/summary:
    get:
      tags: [Events]
      summary: Summarize outbox event counts by status
      description: SUPER_ADMIN-only read endpoint.
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Outbox counts by status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OutboxStatusSummary"
        "401":
          description: Authentication required
        "403":
          description: SUPER_ADMIN role is required

  /dashboard/admin-summary:
    get:
      tags: [Dashboard]
      summary: Get admin dashboard summary
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Admin dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminDashboardSummary"
        "403":
          description: ADMIN role is required

  /dashboard/parking-lot/{id}/summary:
    get:
      tags: [Dashboard]
      summary: Get parking lot dashboard summary
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/Id"
      responses:
        "200":
          description: Parking lot dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParkingLotDashboardSummary"
        "404":
          description: Parking lot not found

  /dashboard/recent-events:
    get:
      tags: [Dashboard]
      summary: Get recent parking events
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Recent check-ins and check-outs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecentParkingEvent"

  /dashboard/today-bookings:
    get:
      tags: [Dashboard]
      summary: Get today's bookings
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Today's bookings

  /dashboard/slot-status-summary:
    get:
      tags: [Dashboard]
      summary: Get slot status summary
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Slot status summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SlotStatusSummary"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema:
        type: integer
        example: 1
    ParkingLotId:
      name: parkingLotId
      in: path
      required: true
      schema:
        type: integer
        example: 1
    FloorId:
      name: floorId
      in: path
      required: true
      schema:
        type: integer
        example: 1
  schemas:
    Role:
      type: string
      enum: [ADMIN, SECURITY, USER]
    ParkingLotType:
      type: string
      enum: [APARTMENT, MALL, HOSPITAL, OFFICE, PUBLIC]
    SlotType:
      type: string
      enum: [CAR, BIKE, EV, HANDICAPPED]
    SlotStatus:
      type: string
      enum: [AVAILABLE, OCCUPIED, RESERVED, MAINTENANCE]
    VehicleType:
      type: string
      enum: [CAR, BIKE, EV]
    BookingStatus:
      type: string
      enum: [PENDING, CONFIRMED, CANCELLED, COMPLETED, EXPIRED]
    ParkingEventStatus:
      type: string
      enum: [ACTIVE, COMPLETED, CANCELLED]
    OutboxEventStatus:
      type: string
      enum: [PENDING, PROCESSING, PROCESSED, FAILED]
    OutboxEventType:
      type: string
      enum:
        - PARKING_CHECKED_IN
        - PARKING_CHECKED_OUT
        - BOOKING_CREATED
        - BOOKING_CANCELLED
        - PAYMENT_VERIFIED
        - NOTIFICATION_REQUESTED
        - GENERIC

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        service:
          type: string
          example: smart-parking-backend

    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Admin User
        email:
          type: string
          example: admin@example.com
        phone:
          type: string
          nullable: true
          example: "+919999999999"
        role:
          $ref: "#/components/schemas/Role"
        isActive:
          type: boolean
          example: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    RegisterRequest:
      type: object
      required: [name, email, password]
      properties:
        name:
          type: string
          example: Admin User
        email:
          type: string
          format: email
          example: admin@example.com
        phone:
          type: string
          example: "+919999999999"
        password:
          type: string
          minLength: 6
          example: password123
        role:
          $ref: "#/components/schemas/Role"
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: admin@example.com
        password:
          type: string
          minLength: 6
          example: password123
    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        accessToken:
          type: string
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.example.signature

    ParkingLot:
      allOf:
        - $ref: "#/components/schemas/CreateParkingLotRequest"
        - type: object
          properties:
            id:
              type: integer
            createdAt:
              type: string
              format: date-time
            updatedAt:
              type: string
              format: date-time
    CreateParkingLotRequest:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
          example: Block A Parking
        type:
          $ref: "#/components/schemas/ParkingLotType"
        address:
          type: string
          example: Apartment main gate, basement entry
        city:
          type: string
          example: Hyderabad
        state:
          type: string
          example: Telangana
        pincode:
          type: string
          example: "500081"
        isActive:
          type: boolean
          example: true
    UpdateParkingLotRequest:
      type: object
      properties:
        name:
          type: string
        type:
          $ref: "#/components/schemas/ParkingLotType"
        address:
          type: string
        city:
          type: string
        state:
          type: string
        pincode:
          type: string
        isActive:
          type: boolean

    Floor:
      allOf:
        - $ref: "#/components/schemas/CreateFloorRequest"
        - type: object
          properties:
            id:
              type: integer
            parkingLotId:
              type: integer
    CreateFloorRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: Basement 1
        level:
          type: integer
          example: -1
    UpdateFloorRequest:
      type: object
      properties:
        name:
          type: string
        level:
          type: integer

    Slot:
      allOf:
        - $ref: "#/components/schemas/CreateSlotRequest"
        - type: object
          properties:
            id:
              type: integer
            floorId:
              type: integer
    CreateSlotRequest:
      type: object
      required: [slotNumber]
      properties:
        slotNumber:
          type: string
          example: B1-C-001
        slotType:
          $ref: "#/components/schemas/SlotType"
        status:
          $ref: "#/components/schemas/SlotStatus"
    CreateBulkSlotsRequest:
      type: object
      required: [slots]
      properties:
        slots:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/CreateSlotRequest"
    UpdateSlotStatusRequest:
      type: object
      required: [status]
      properties:
        status:
          $ref: "#/components/schemas/SlotStatus"

    Vehicle:
      allOf:
        - $ref: "#/components/schemas/CreateVehicleRequest"
        - type: object
          properties:
            id:
              type: integer
            userId:
              type: integer
    CreateVehicleRequest:
      type: object
      required: [vehicleNumber, vehicleType]
      properties:
        vehicleNumber:
          type: string
          example: TS09EA1234
        vehicleType:
          $ref: "#/components/schemas/VehicleType"
        brand:
          type: string
          example: Hyundai
        model:
          type: string
          example: Creta
        color:
          type: string
          example: White
    UpdateVehicleRequest:
      type: object
      properties:
        vehicleNumber:
          type: string
        vehicleType:
          $ref: "#/components/schemas/VehicleType"
        brand:
          type: string
        model:
          type: string
        color:
          type: string

    CreateBookingRequest:
      type: object
      required: [vehicleId, slotId, startTime]
      properties:
        vehicleId:
          type: integer
          example: 1
        slotId:
          type: integer
          example: 1
        startTime:
          type: string
          format: date-time
          example: "2026-06-14T10:00:00.000Z"
        endTime:
          type: string
          format: date-time
          example: "2026-06-14T18:00:00.000Z"

    CheckInRequest:
      type: object
      properties:
        bookingId:
          type: integer
          example: 1
        bookingCode:
          type: string
          example: BK-1781389000000-ABC123
    CheckOutRequest:
      type: object
      required: [parkingEventId]
      properties:
        parkingEventId:
          type: integer
          example: 1
    CheckoutResponse:
      type: object
      properties:
        parkingEvent:
          type: object
          properties:
            id:
              type: integer
              example: 1
            bookingId:
              type: integer
              example: 1
            userId:
              type: integer
              example: 1
            status:
              $ref: "#/components/schemas/ParkingEventStatus"
            durationMinutes:
              type: integer
              example: 121
            feeAmount:
              type: number
              example: 110
        paymentInitiated:
          type: boolean
          example: true
        payment:
          type: object
          nullable: true
          example:
            id: 1
            status: INITIATED
            amount: 110
            currency: INR
        paymentError:
          type: string
          nullable: true
          example: Payment service unavailable
    OutboxMonitorEvent:
      type: object
      description: Safe outbox event monitor row. Payload is intentionally not exposed.
      properties:
        id:
          type: integer
          example: 1
        eventId:
          type: string
          format: uuid
        eventType:
          $ref: "#/components/schemas/OutboxEventType"
        organizationId:
          type: integer
          nullable: true
          example: 1
        aggregateType:
          type: string
          nullable: true
          example: ParkingEvent
        aggregateId:
          type: string
          nullable: true
          example: "12"
        status:
          $ref: "#/components/schemas/OutboxEventStatus"
        attempts:
          type: integer
          example: 0
        maxAttempts:
